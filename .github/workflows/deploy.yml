name: Deploy

# Production deploy on merge to main. Requires repo secrets CF_API_TOKEN and
# CF_ACCOUNT_ID, and a Cloudflare Pages project named "thedronebrothers"
# (see TODO.md #8). Until those exist, this job will fail on the deploy step only.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thedronebrothers --branch=main
