name: CI

# Runs on every PR into main. No secrets required — this is the quality gate.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the secret scan

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Type + content-schema check
        run: npm run check

      - name: Build (Astro + Pagefind)
        run: npm run build

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--offline --no-progress --root-dir ${{ github.workspace }}/dist 'dist/**/*.html'"
          fail: true

      - name: Secret scan (gitleaks)
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --verbose
